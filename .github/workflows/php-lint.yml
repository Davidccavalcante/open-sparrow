name: PHP Code Linting

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# NAPRAWA 1: Wymuszenie Node.js 24 dla wszystkich akcji
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  phpcs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: phpcs

    - name: Run PHP CodeSniffer
      # NAPRAWA 2: Dodajemy parametr, który ignoruje ostrzeżenia przy kodzie wyjścia
      run: phpcs --standard=phpcs.xml --runtime-set ignore_warnings_on_exit 1